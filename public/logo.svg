<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" role="img" aria-label="Yango Expert">
  <!-- Icône fond vert arrondi -->
  <rect x="0" y="8" width="144" height="144" rx="28" ry="28" fill="#389e74"/>
  
  <!-- Y blanc -->
  <polygon points="28,32 72,92 116,32 104,32 72,74 40,32" fill="white"/>
  <rect x="63" y="92" width="18" height="52" fill="white"/>
  
  <!-- Trait rouge diagonal -->
  <polygon points="28,32 58,74 72,55 44,32" fill="#ea3323"/>
  
  <!-- Ligne séparatrice verte -->
  <line x1="164" y1="28" x2="164" y2="132" stroke="#389e74" stroke-width="3"/>
  
  <!-- Texte YANGO -->
  <text x="184" y="84" 
    font-family="'Syne', 'Arial Black', 'Impact', sans-serif"
    font-size="52" font-weight="900" 
    letter-spacing="2"
    fill="white">YANGO</text>
  
  <!-- Texte EXPERT -->
  <text x="184" y="132" 
    font-family="'Syne', 'Arial Black', 'Impact', sans-serif"
    font-size="52" font-weight="900"
    letter-spacing="2"
    fill="#389e74">EXPERT</text>
</svg>
